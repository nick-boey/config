{{{{raw}}}}
# Managed by dotter. In the repo, the config below is wrapped in a Handlebars
# raw block so dotter's templater leaves oh-my-posh's brace syntax intact
# on Windows (copy/template mode, no symlinks). Edit the config normally.
console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[palette]
  black = '#202020'
  blue = '#51A5C1'
  green = '#36A390'
  orange = '#F07623'
  red = '#DA1A32'
  white = '#FFF2DF'
  yellow = '#FFEA76'

[secondary_prompt]
  template = '> '
  foreground = 'p:green'
  background = 'transparent'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    template = 'PS '
    foreground = 'p:blue'
    background = 'transparent'
    type = 'session'
    style = 'plain'

  [[blocks.segments]]
    template = '{{ path .Path .Location }} 🖊️'
    foreground = 'p:green'
    background = 'transparent'
    type = 'path'
    style = 'plain'

    [blocks.segments.options]
    style = 'full'

    [blocks.segments.options.mapped_locations]
    ':\\Users\\nboey' = '~'

[[blocks]]
  alignment = 'right'
  type = 'rprompt'

  [[blocks.segments]]
    template = ' {{ if .UpstreamURL }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }} '
    foreground = 'p:green'
    background = 'transparent'
    type = 'git'
    style = 'plain'

    [blocks.segments.options]
      branch_template = '{{ trunc 25 .Branch }}'
      fetch_status = true
      fetch_upstream_icon = true

[[tooltips]]
  leading_diamond = ''
  trailing_diamond = ''
  template = '  {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
  foreground = 'p:white'
  background = 'p:orange'
  type = 'aws'
  style = 'diamond'
  tips = ['aws']

  [tooltips.options]
    display_default = true

[[tooltips]]
  leading_diamond = ''
  trailing_diamond = ''
  template = '  {{ .Name }} '
  foreground = 'p:white'
  background = 'p:blue'
  type = 'az'
  style = 'diamond'
  tips = ['az']

  [tooltips.options]
    display_default = true
{{{{/raw}}}}

[manager]
show_hidden = true
show_symlink = true

[opener]
edit = [
  { run = '$EDITOR "$@"', block = true, for = "unix" },
  { run = 'nvim.exe %*', block = true, desc = "windows", for = "windows" },
]

[open]
rules = [
  # Text files
  { mime = "text/*", use = "edit" },

  # Code files - Programming languages
  { mime = "application/javascript", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "application/x-sh", use = "edit" },
  { mime = "application/x-shellscript", use = "edit" },
  { mime = "application/x-python", use = "edit" },
  { mime = "application/x-ruby", use = "edit" },
  { mime = "application/x-perl", use = "edit" },
  { mime = "application/x-php", use = "edit" },
  { mime = "application/x-lua", use = "edit" },
  { mime = "application/xml", use = "edit" },
  { mime = "application/toml", use = "edit" },
  { mime = "application/yaml", use = "edit" },

  # Config and markup files by extension
  { url = "*.rs", use = "edit" },
  { url = "*.go", use = "edit" },
  { url = "*.ts", use = "edit" },
  { url = "*.tsx", use = "edit" },
  { url = "*.jsx", use = "edit" },
  { url = "*.vue", use = "edit" },
  { url = "*.svelte", use = "edit" },
  { url = "*.cs", use = "edit" },
  { url = "*.java", use = "edit" },
  { url = "*.cpp", use = "edit" },
  { url = "*.c", use = "edit" },
  { url = "*.h", use = "edit" },
  { url = "*.hpp", use = "edit" },
  { url = "*.toml", use = "edit" },
  { url = "*.yaml", use = "edit" },
  { url = "*.yml", use = "edit" },
  { url = "*.json", use = "edit" },
  { url = "*.md", use = "edit" },
  { url = "*.conf", use = "edit" },
  { url = "*.config", use = "edit" },
  { url = "*.ini", use = "edit" },
  { url = "*.sh", use = "edit" },
  { url = "*.bash", use = "edit" },
  { url = "*.zsh", use = "edit" },
  { url = "*.ps1", use = "edit" },
  { url = "*.bat", use = "edit" },
  { url = "*.cmd", use = "edit" },
  { url = "Makefile", use = "edit" },
  { url = "Dockerfile", use = "edit" },
]
